# Configurações gerais do pipeline.

# Contexto do time — usado pela IA para pontuar relevância.
# Quanto mais específico, melhor o ranking.
team_context: |
  Somos a área Inteligência & Growth do Grupo Casas Bahia (varejo brasileiro).
  Construímos IA aplicada DENTRO DE CASA, com custo marginal próximo de zero,
  evitando licenças de mercado. A maioria dos apps roda por script (Python) e a
  IA entra para acelerar a construção e melhorar análise/leitura.

  PROJETOS E DOMÍNIOS ATUAIS (o que fazemos):
  - Pricing B2B e B2C: captura de preço de concorrentes (scraping), sugestão de
    preço por competitividade e margem (MC4), repricing.
  - Recomendação/ranking de SKUs: ML (feature engineering, calibração, feedback
    loop, métricas tipo Spearman), champion×challenger.
  - Criativos e banners com IA: geração de imagem/vídeo, render Python +
    Playwright/Chrome headless, gestão autônoma de banners.
  - GEO (Generative Engine Optimization): como as LLMs citam/recomendam a marca,
    Share of Voice em respostas de IA, agentes de compra, SEO para IA.
  - Bot de mídia paga (Google Ads): otimização de lances, bandit/bayesiano
    (Thompson Sampling), guardrails, ROAS/AdCost.
  - Pods de agentes (multi-agente): orquestrador + analistas + inspetor + relator;
    auditoria de CRM (Salesforce Marketing Cloud), automação read-only.
  - Esteira de automação: data lake, text-to-SQL ("IA que conhece nossas tabelas"),
    ATAs inteligentes, alertas, geração automática de relatórios/decks.

  STACK: Python, Databricks/Delta, GCP/Cloud Run, Google Ads API, Salesforce
  Marketing Cloud, Power BI, Notion, APIs de LLM (Claude, OpenAI, Gemini),
  frameworks de agentes e MCP.

  DÊ NOTA ALTA (4-5) para notícias sobre: novos modelos de LLM e seus PREÇOS
  (custo é crítico p/ nós), modelos abertos/baratos, ganhos de custo-desempenho,
  agentes autônomos e multi-agente, MCP e ferramentas/tools para agentes,
  text-to-SQL e IA sobre bancos de dados, geração de imagem/vídeo, RAG, ranking/
  recomendação, otimização de mídia/bidding com IA, GEO e como marcas aparecem em
  respostas de IA, e ferramentas open-source que reduzem custo. NOTA BAIXA (1-2)
  para hype genérico, política de IA sem efeito prático e temas fora de varejo/eng.

# Modelos Claude usados
models:
  # síntese final do digest — Gemini (Google AI Studio), com tier gratuito.
  # gemini-2.5-flash: rápido e barato, ótimo para resumir/agrupar/rankear.
  # Alternativas: gemini-2.5-flash-lite (mais barato) | gemini-2.5-pro (mais capaz)
  synthesis: gemini-2.5-flash
  # (reservado para filtragem em massa futura, mais barato ainda)
  triage: gemini-2.5-flash-lite

# Quantos itens no máximo enviar para a IA sintetizar por rodada (semanal = mais)
max_items_to_synthesize: 150

# Janela de coleta: só considera itens das últimas N horas.
# 180h ≈ 7,5 dias — cobre a semana com folga; a dedup evita repetir a semana anterior.
lookback_hours: 180

# Título do dashboard
dashboard_title: "Radar de IA — Grupo Casas Bahia"
